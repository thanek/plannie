<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Plannie{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <script>
    (function(){
      var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <header>
    <a href="/" class="logo">🃏 Plannie</a>
    <div class="header-right">
      {% block header_user %}{% endblock %}
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Przełącz motyw"></button>
    </div>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateIcon();
    }
    function updateIcon() {
      var btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
    }
    updateIcon();

    // Utrzymuje obecność (imię „żywe"), by inni nie mogli go przejąć.
    (function () {
      function beat() {
        fetch('/heartbeat', { method: 'POST', credentials: 'same-origin' }).catch(function () {});
      }
      beat();
      setInterval(beat, 10000);
    })();
  </script>
</body>
</html>
